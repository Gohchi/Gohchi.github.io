<html>
  <head>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" name="viewport">
    
    <title>Mosaicos</title>
		<link rel="shortcut icon" type="image/svg+xml" href="favicon.svg"/>
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script> <!-- release -->

    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <header class="mdc-top-app-bar">
        <div class="mdc-top-app-bar__row">
          <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-start">
            <!-- <button class="material-icons mdc-top-app-bar__navigation-icon mdc-icon-button" aria-label="Open navigation menu">menu</button> -->
            <!-- <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button" aria-label="Help" @click="showHelp=!showHelp">help</button> -->
            <div class="main-icon"></div>
            <span class="mdc-top-app-bar__title">Mosaicos</span>
          </section>
          <section id="toolbar-actions" class="mdc-top-app-bar__section mdc-top-app-bar__section--align-end" role="toolbar">
            <template v-if="ready">
              <div class="mdc-menu-surface--anchor">
                <button id="button-download"
                  class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
                  aria-label="Size"
                  @click="openMenu('download')"
                >download</button>
                <div id="menu-download" class="mdc-menu mdc-menu-surface">
                  <ul class="mdc-list" role="menu" aria-hidden="true" aria-orientation="vertical" tabindex="-1">
                    <component v-for="[key, value] in [['download', 'Descargar'], ['print', 'Imprimir']]">
                      <li class="mdc-list-item" role="menuitem"
                        v-bind:class="(download==key ? 'mdc-list-item--selected' : null)"
                        @click="download=key; downloadFile(); changeType();"
                      >
                        <span class="mdc-list-item__ripple"></span>
                        <span class="mdc-list-item__text">{{ value }}</span>
                      </li>
                    </component>
                  </ul>
                </div>
              </div>

              <div class="mdc-menu-surface--anchor">
                <button id="button-bg-color"
                  class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
                  aria-label="Size"
                  @click="openMenu('bg-color')"
                >colorize</button>
                <div id="menu-bg-color" class="mdc-menu mdc-menu-surface">
                  <ul class="mdc-list" role="menu" aria-hidden="true" aria-orientation="vertical" tabindex="-1">
                    <component v-for="[key, value] in [['white', 'Blanco'], ['black', 'Negro'], ['gray', 'Gris']]">
                      <li class="mdc-list-item" role="menuitem"
                        v-bind:class="(bgColor==key ? 'mdc-list-item--selected' : null)"
                        @click="bgColor=key; changeType();"
                      >
                        <span class="mdc-list-item__ripple"></span>
                        <span class="mdc-list-item__text">{{ value }}</span>
                      </li>
                    </component>
                  </ul>
                </div>
              </div>
            
              <div class="mdc-menu-surface--anchor">
                <button id="button-line-styles"
                  class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
                  aria-label="Size"
                  @click="openMenu('line-styles')"
                >line_style</button>
                <div id="menu-line-styles" class="mdc-menu mdc-menu-surface">
                  <ul class="mdc-list" role="menu" aria-hidden="true" aria-orientation="vertical" tabindex="-1">
                    <component v-for="[key, value] in [['NONE', 'Nada'], ['LINE', 'Normal'], ['DASH', 'Líneas']]">
                      <li class="mdc-list-item" role="menuitem"
                        v-bind:class="(lineStyles==key ? 'mdc-list-item--selected' : null)"
                        @click="lineStyles=key; changeType();"
                      >
                        <span class="mdc-list-item__ripple"></span>
                        <span class="mdc-list-item__text">{{ value }}</span>
                      </li>
                    </component>
                  </ul>
                </div>
              </div>

              <div class="mdc-menu-surface--anchor">
                <button id="button-sizes" class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
                  aria-label="Size"
                  @click="openMenu('sizes')"
                >photo_size_select_large</button>
                <div id="menu-sizes" class="mdc-menu mdc-menu-surface">
                  <ul class="mdc-list" role="menu" aria-hidden="true" aria-orientation="vertical" tabindex="-1">
                    <component v-for="item in ['A4', 'A3', 'CUSTOM']">
                      <li class="mdc-list-item" role="menuitem"
                        v-bind:class="(sizeName==item ? 'mdc-list-item--selected' : null)"
                        @click="sizeName=item; changeType();"
                      >
                        <span class="mdc-list-item__ripple"></span>
                        <span class="mdc-list-item__text">{{ item }}</span>
                      </li>
                    </component>
                  </ul>
                </div>
              </div>

              <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button" aria-label="Orientation"
                @click="swapOrientation"
              >rotate_90_degrees_ccw</button>

              <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button" aria-label="Border"
                @click="showBorder=!showBorder"
              >{{ showBorder ? 'border_clear' : 'border_outer' }}</button>
              
              <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button" aria-label="Refresh"
                v-bind:disabled="!ready" @click="refresh"
              >autorenew</button>

              <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button" aria-label="Clear"
                @click="clearAll"
              >clear</button>
            </template>

            <label v-if="!ready" class="mdc-button mdc-button--outlined mdc-top-app-bar__action-item load-file-button">
              <input type="file" id="file" v-on:change="fileLoaded" style="display: none;">
              <div class="mdc-button__ripple"></div>
              <span class="mdc-button__label">Cargar</span>
            </label>
          </section>
        </div>
      </header>
      <main class="mdc-top-app-bar--fixed-adjust">
        <!-- <div v-if="showHelp" style="padding: 20px;">{{ message }}</div> -->
        <canvas id="canvas"
          v-if="size"
          v-bind:width="size.width"
          v-bind:height="size.height"
          v-bind:style="showBorder ? styleCanvas : null"
        ></canvas>
        <div v-if="ready" class="size-type-info mdc-top-app-bar__title">
          <span v-if="sizeName!='CUSTOM'" class="size-info">{{ sizeName }} - {{(orientation == 'v' ? 'vertical' : 'horizontal')}} ({{ size.width }}x{{ size.height }})</span>
          
          <component v-if="sizeName=='CUSTOM'" class="custom-sizes">
            <label class="mdc-text-field mdc-text-field--outlined mdc-text-field--with-leading-icon mdc-text-field--with-trailing-icon">
              <span class="mdc-notched-outline">
                <span class="mdc-notched-outline__leading"></span>
                <span class="mdc-notched-outline__trailing"></span>
              </span>
              <i class="material-icons mdc-text-field__icon mdc-text-field__icon--leading">
                {{ orientation=='h' ? 'swap_horiz' : 'swap_vert' }}
              </i>
              <input class="mdc-text-field__input" type="number" min="1" v-model="customWidth" @keyup="changeType" @change="changeType" />
            </label>
            <label class="mdc-text-field mdc-text-field--outlined mdc-text-field--with-leading-icon mdc-text-field--with-trailing-icon">
              <span class="mdc-notched-outline">
                <span class="mdc-notched-outline__leading"></span>
                <span class="mdc-notched-outline__trailing"></span>
              </span>
              <i class="material-icons mdc-text-field__icon mdc-text-field__icon--leading">
                {{ orientation=='v' ? 'swap_horiz' : 'swap_vert' }}
              </i>
              <input class="mdc-text-field__input" type="number" min="1" v-model="customHeight" @keyup="changeType" />
            </label>
          </component>

          <details class="accordion-item">
            <summary class="accordion-header">
              <span># por línea</span>
              <i class="material-icons accordion-icon">expand_more</i>
            </summary>
            <div class="accordion-content">
              <div>
          <input
            class="mdc-text-field__input number-two-digits"
            type="number"
            min="1"
            v-model="amountHorizontal"
            @keyup="refresh"
          />
          
          <template v-if="window.innerWidth < 700">
            <button
              class="material-icons mdc-icon-button"
              @click="amountHorizontal--; refresh();"
            >keyboard_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="amountHorizontal-=10; refresh();"
            >keyboard_double_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="amountHorizontal+=10; refresh();"
            >keyboard_double_arrow_right</button>
            <button
              class="material-icons mdc-icon-button"
              @click="amountHorizontal++; refresh();"
            >keyboard_arrow_right</button>
          </template>
              </div>
            </div>
          </details>

          <details class="accordion-item">
            <summary class="accordion-header">
              <span>Margen</span>
              <i class="material-icons accordion-icon">expand_more</i>
            </summary>
            <div class="accordion-content">
              <div>
          <span class="margin-label">Arriba:</span>
          <input
            class="mdc-text-field__input number-two-digits"
            type="number"
            min="0"
            v-model="marginTop"
            @keyup="refresh"
          />
          
          <template v-if="window.innerWidth < 700">
            <button
              class="material-icons mdc-icon-button"
              @click="marginTop--; refresh();"
            >keyboard_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginTop-=10; refresh();"
            >keyboard_double_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginTop+=10; refresh();"
            >keyboard_double_arrow_right</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginTop++; refresh();"
            >keyboard_arrow_right</button>
          </template>
              </div>
              <div>
          <span class="margin-label">Derecha:</span>
          <input
            class="mdc-text-field__input number-two-digits"
            type="number"
            min="0"
            v-model="marginRight"
            @keyup="refresh"
          />
          
          <template v-if="window.innerWidth < 700">
            <button
              class="material-icons mdc-icon-button"
              @click="marginRight--; refresh();"
            >keyboard_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginRight-=10; refresh();"
            >keyboard_double_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginRight+=10; refresh();"
            >keyboard_double_arrow_right</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginRight++; refresh();"
            >keyboard_arrow_right</button>
          </template>
              </div>
              <div>
          <span class="margin-label">Abajo:</span>
          <input
            class="mdc-text-field__input number-two-digits"
            type="number"
            min="0"
            v-model="marginBottom"
            @keyup="refresh"
          />
          
          <template v-if="window.innerWidth < 700">
            <button
              class="material-icons mdc-icon-button"
              @click="marginBottom--; refresh();"
            >keyboard_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginBottom-=10; refresh();"
            >keyboard_double_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginBottom+=10; refresh();"
            >keyboard_double_arrow_right</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginBottom++; refresh();"
            >keyboard_arrow_right</button>
          </template>
              </div>
              <div>
          <span class="margin-label">Izquierda:</span>
          <input
            class="mdc-text-field__input number-two-digits"
            type="number"
            min="0"
            v-model="marginLeft"
            @keyup="refresh"
          />
              
          <template v-if="window.innerWidth < 700">
            <button
              class="material-icons mdc-icon-button"
              @click="marginLeft--; refresh();"
            >keyboard_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginLeft-=10; refresh();"
            >keyboard_double_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginLeft+=10; refresh();"
            >keyboard_double_arrow_right</button>
            <button
              class="material-icons mdc-icon-button"
              @click="marginLeft++; refresh();"
            >keyboard_arrow_right</button>
          </template>
              </div>
            </div>
          </details>

          <details class="accordion-item">
            <summary class="accordion-header">
              <span>Espacio</span>
              <i class="material-icons accordion-icon">expand_more</i>
            </summary>
            <div class="accordion-content">
              <div>
          <input
            class="mdc-text-field__input number-two-digits"
            type="number"
            min="0"
            v-model="gap"
            @keyup="refresh"
          />
          
          <template v-if="window.innerWidth < 700">
            <button
              class="material-icons mdc-icon-button"
              @click="gap--; refresh();"
            >keyboard_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="gap-=10; refresh();"
            >keyboard_double_arrow_left</button>
            <button
              class="material-icons mdc-icon-button"
              @click="gap+=10; refresh();"
            >keyboard_double_arrow_right</button>
            <button
              class="material-icons mdc-icon-button"
              @click="gap++; refresh();"
            >keyboard_arrow_right</button>
          </template>
              </div>
            </div>
          </details>
        </div>

        <canvas id="zoom"
          v-bind:width="zoomSize.width"
          v-bind:height="zoomSize.height"
          @click="moveZoom()"
        ></canvas>
      </main>
    </div>
    <script src="scripts.js"></script>
  </body>
</html>
